{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-body">
            <!-- W tym miejscu JS wyrenderuje cały kalendarz -->
            <div id='calendar'></div>
        </div>
    </div>
</div>

<!-- 1. Pobieramy style i skrypty FullCalendar przez CDN -->
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');

    var calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth', // Domyślny widok miesiąca
      locale: 'pl',                 // Kalendarz po polsku!
      themeSystem: 'bootstrap5',   // Integracja z Bootstrap 5

      headerToolbar: {
        left: 'prev,next today',
        center: 'title',
        right: 'dayGridMonth,timeGridWeek,timeGridDay'
      },

      // KLUCZOWY MOMENT: Wskazujemy FullCalendar skąd ma brać wydarzenia.
      // JS sam wyśle zapytanie pod ten adres!
      events: '/api/data',

      // Dodatkowa interakcja – kliknięcie w wydarzenie
      eventClick: function(info) {
        alert('Zadanie: ' + info.event.title);
      }
    });

    calendar.render();
  });
</script>

<!-- Prosty fix, żeby dopasować przyciski FullCalendar do stylu Bootstrapa -->
<style>
    .fc .fc-button-primary {
        background-color: #0d6efd;
        border-color: #0d6efd;
    }
    .fc .fc-button-primary:hover {
        background-color: #0b5ed7;
        border-color: #0a58ca;
    }
</style>
{% endblock %}
