{% extends 'base.html' %}
{% block styles %}
{{ super() }}
<style>
    a {
        text-decoration: none;
    }
    a:hover {
        font-weight: bold;
        text-decoration: underline;
    }
</style>
{% endblock %}
{% block title %}Select Movie{% endblock %}

{% block content %}
<div class="container">
    <h1 class="heading">Select Movie</h1>
{% for movie in movie_dict %}
  <p>
      <a href="{{ url_for('seek',id = movie.id) }}"> {{ movie.original_title }} - {{ movie.release_date[:4] }}  </a>
  </p>
{% endfor %}

</div>
{% endblock %}
