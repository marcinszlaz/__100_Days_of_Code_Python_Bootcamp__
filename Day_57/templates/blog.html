<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blog page</title>
    <link rel="stylesheet" type="text/css" href="{{url_for('static',filename='/style.css')}}" />
</head>
    <body>
        <header>
            {% for post in posts: %}
                {% if post["id"] == 2: %}
                    <h1>{{post["title"]}}</h1>
                    <h2>{{post["subtitle"]}}</h2>
                {% endif %}
            {% endfor %}
        </header>
    <footer>
        <hr>
        <strong>Copyright {{year}} by Marcyś&copy; </strong>
        <hr>
    </footer>


    </body>
</html>
