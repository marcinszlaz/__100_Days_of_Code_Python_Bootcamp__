<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/styles.css">
</head>
<body>
<div class="wrapper">
    <div class="top">
        <div class="title"><h1>My Blog</h1></div>
    </div>
    {% for post in response_: %}
    <div class="content">
        <div class="card">
            <h2>{{post["title"]}}</h2>
            <p class="text">{{post["subtitle"]}} </p>
            <a href="{{url_for('display_blog',post_id=post['id'])}}">Read</a>
            <!-- in code above you have to have variable names like in main.py, basicly it's code Python code but encapsulate in HTML codd through jinja -->
        </div>
    </div>
    {% endfor %}
</div>
</body>
<footer>
    <p>Made with ♥️ in London.</p>
</footer>
</html>
